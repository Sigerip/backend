openapi: 3.0.0
info:
  title: API de Tábuas Biométricas/Atuariais
  description: API para consulta e filtragem de dados da tábua original.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Servidor Local (Desenvolvimento)
  # Você pode adicionar a URL da Vercel aqui depois:
  # - url: https://sua-api-flask.vercel.app
  #   description: Produção

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key # Altere se o nome do seu header for outro (ex: Authorization)
      description: Chave de API necessária para acessar os endpoints.

paths:
  /original:
    get:
      summary: Lista dados da Tábua Original
      description: Retorna os registros da tabela `tabua_original` com suporte a paginação e filtros opcionais por ano, sexo, localidade e faixa etária.
      security:
        - ApiKeyAuth: []
      tags:
        - Tábuas
      parameters:
        - in: query
          name: ano
          schema:
            type: integer
          description: Filtra os registros por um ano específico.
        - in: query
          name: sexo
          schema:
            type: integer
          description: ID correspondente ao sexo (ex. dimensão de sexo).
        - in: query
          name: local
          schema:
            type: integer
          description: ID correspondente à localidade (ex. dimensão de local).
        - in: query
          name: faixa
          schema:
            type: integer
          description: ID correspondente à faixa etária (ex. dimensão de idades).
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Número da página atual para paginação.
        - in: query
          name: per_page
          schema:
            type: integer
            default: 100
          description: Quantidade de registros retornados por página.
      responses:
        '200':
          description: Sucesso. Retorna os dados paginados.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1042
                        ano:
                          type: integer
                          example: 2026
                        id_sexo:
                          type: integer
                          example: 1
                        id_local:
                          type: integer
                          example: 3
                        id_faixa:
                          type: integer
                          example: 5
                        probabilidade:
                          type: number
                          format: float
                          example: 0.00145
                  page:
                    type: integer
                    example: 1
                  per_page:
                    type: integer
                    example: 100
                  total:
                    type: integer
                    example: 5000
        '401':
          description: Não autorizado. API Key ausente ou inválida.
        '500':
          description: Erro interno no servidor ou na comunicação com o banco de dados.